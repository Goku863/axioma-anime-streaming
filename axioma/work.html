<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#080816" />
  <title>Browse Anime — AnimeForYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-chip {
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip:hover,
    .filter-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
  </div>

  <div class="mobile-nav-overlay" id="navOverlay" onclick="closeNav()"></div>
  <nav class="mobile-nav" id="mobileNav">
    <button class="close-btn" onclick="closeNav()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="nav-brand">Anime<span>ForYou</span></div>
    <a href="index.html">Home</a>
    <a href="work.html" class="active">Browse</a>
    <a href="services.html">Features</a>
    <a href="about.html">About</a>
    <a href="contact.html">Support</a>
  </nav>

  <header class="header" id="siteHeader">
    <div class="header-inner">
      <button class="menu-btn" onclick="openNav()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <a href="index.html" class="logo">Anime<span>ForYou</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="work.html" class="active">Browse</a>
        <a href="services.html">Features</a>
        <a href="about.html">About</a>
        <a href="contact.html">Support</a>
      </div>
    </div>
  </header>

  <section class="hero" style="padding-bottom: 24px;">
    <h1>Browse <span class="gradient">Anime</span></h1>
    <p>Explore our collection of popular anime series</p>
  </section>

  <section class="search-section" style="padding-bottom: 16px;">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search anime..." onkeyup="filterAnime()" />
    </div>
  </section>

  <main class="container">
    <div class="filter-bar" id="filterBar">
      <button class="filter-chip active" onclick="filterByGenre('all', this)">All</button>
      <button class="filter-chip" onclick="filterByGenre('Action', this)">Action</button>
      <button class="filter-chip" onclick="filterByGenre('Comedy', this)">Comedy</button>
      <button class="filter-chip" onclick="filterByGenre('Drama', this)">Drama</button>
      <button class="filter-chip" onclick="filterByGenre('Fantasy', this)">Fantasy</button>
      <button class="filter-chip" onclick="filterByGenre('Sci-Fi', this)">Sci-Fi</button>
    </div>
    <div class="anime-grid" id="animeGrid"></div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">Anime<span>ForYou</span></div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="work.html">Browse</a>
        <a href="about.html">About</a>
        <a href="contact.html">Support</a>
      </div>
      <p>&copy; 2026 AnimeForYou. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/data-store.js"></script>
  <script src="assets/js/animations.js"></script>
  <script>
    function openNav() {
      document.getElementById('mobileNav').classList.add('open');
      document.getElementById('navOverlay').classList.add('open');
    }
    function closeNav() {
      document.getElementById('mobileNav').classList.remove('open');
      document.getElementById('navOverlay').classList.remove('open');
    }

    let allAnime = [];
    let currentGenre = 'all';

    function loadAnime() {
      allAnime = DataStore.getList();
      renderGrid(allAnime);
    }

    function renderGrid(list) {
      const grid = document.getElementById('animeGrid');
      if (!list.length) {
        grid.innerHTML = '<p class="empty-message">No anime found.</p>';
        return;
      }
      grid.innerHTML = list.map(a => `
        <a href="episode.html?id=${a.id}" class="anime-card">
          <div class="poster">
            <img src="${a.image || 'https://cdn.myanimelist.net/images/anime/1015/138006l.jpg'}" alt="${(a.title || '').replace(/"/g, '&quot;')}" loading="lazy" />
            <div class="overlay">
              <div class="play-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
              </div>
            </div>
          </div>
          <div class="info">
            <div class="title">${(a.title || 'Unknown').replace(/</g, '&lt;')}</div>
            <div class="meta">
              <span class="rating">${a.rating || 'N/A'}★</span>
              <span class="genre">${a.genre || 'Anime'}</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    function filterAnime() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allAnime.filter(a =>
        (a.title || '').toLowerCase().includes(q) ||
        (a.genre || '').toLowerCase().includes(q)
      );
      if (currentGenre !== 'all') {
        filtered = filtered.filter(a => (a.genre || '') === currentGenre);
      }
      renderGrid(filtered);
    }

    function filterByGenre(genre, el) {
      currentGenre = genre;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      filterAnime();
    }

    DataStore.init();
    DataStore.seedData();
    loadAnime();
  </script>
</body>
</html>
