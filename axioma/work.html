<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#080816" />
  <title>Browse Anime — AnimeForYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="ambient"><div class="ambient-orb orb-1"></div><div class="ambient-orb orb-2"></div><div class="ambient-orb orb-3"></div></div>

  <div class="mobile-nav-overlay" id="navOverlay" onclick="closeNav()"></div>
  <nav class="mobile-nav" id="mobileNav">
    <button class="close-btn" onclick="closeNav()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="nav-brand">Anime<span>ForYou</span></div>
    <a href="index.html">Home</a><a href="work.html" class="active">Browse</a><a href="services.html">Features</a><a href="about.html">About</a><a href="contact.html">Support</a>
  </nav>

  <header class="header" id="siteHeader">
    <div class="header-inner">
      <button class="menu-btn" onclick="openNav()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <a href="index.html" class="logo">Anime<span>ForYou</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a><a href="work.html" class="active">Browse</a><a href="services.html">Features</a><a href="about.html">About</a><a href="contact.html">Support</a>
      </div>
    </div>
  </header>

  <section class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search anime..." onkeyup="filterAnime()" />
      <button onclick="filterAnime()">Search</button>
    </div>
  </section>

  <main class="container">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px" id="genreChips"></div>
    <div class="anime-grid" id="animeGrid"></div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">Anime<span>ForYou</span></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="work.html">Browse</a><a href="about.html">About</a><a href="contact.html">Support</a></div>
      <p>&copy; 2026 AnimeForYou. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/data-store.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/chatbot.js"></script>
  <script>
    function openNav() { document.getElementById('mobileNav').classList.add('open'); document.getElementById('navOverlay').classList.add('open'); }
    function closeNav() { document.getElementById('mobileNav').classList.remove('open'); document.getElementById('navOverlay').classList.remove('open'); }

    let allAnime = [], currentGenre = 'all';
    const genres = ['all','action','romance','comedy','fantasy','sci-fi','drama','thriller','adventure'];

    function init() {
      document.getElementById('genreChips').innerHTML = genres.map(g =>
        `<button class="admin-tab ${g==='all'?'active':''}" onclick="setGenre('${g}',this)">${g.charAt(0).toUpperCase()+g.slice(1)}</button>`
      ).join('');
      allAnime = DataStore.getList();
      renderGrid();
      if (window.AnimeAnimations) setTimeout(() => window.AnimeAnimations.initReveal(), 100);
    }

    function setGenre(g, btn) {
      currentGenre = g;
      document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterAnime();
    }

    function renderGrid(list) {
      const grid = document.getElementById('animeGrid');
      const items = list || allAnime.filter(a => currentGenre === 'all' || (a.genre||'').toLowerCase().includes(currentGenre));
      if (!items.length) { grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:60px 20px">No anime found.</p>'; return; }
      grid.innerHTML = items.map(a =>
        `<a href="episode.html?id=${a.id}" class="anime-card">
          <img src="${a.image||'https://cdn.myanimelist.net/images/anime/1015/138006l.jpg'}" alt="${(a.title||'').replace(/"/g,'&quot;')}" loading="lazy" crossorigin="anonymous" referrerpolicy="no-referrer" />
          <div class="info"><div class="title">${(a.title||'Unknown').replace(/</g,'&lt;')}</div><div class="meta"><span class="rating">${a.rating||'N/A'}★</span> ${a.genre||'Anime'}</div></div>
        </a>`
      ).join('');
    }

    function filterAnime() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderGrid(allAnime.filter(a => {
        const s = (a.title||'').toLowerCase().includes(q) || (a.genre||'').toLowerCase().includes(q);
        const g = currentGenre === 'all' || (a.genre||'').toLowerCase().includes(currentGenre);
        return s && g;
      }));
    }

    DataStore.init();
    DataStore.seedData();
    init();
  </script>
</body>
</html>
