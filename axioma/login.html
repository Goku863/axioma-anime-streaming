<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Login — AnimeForYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #151520;
      --text-primary: #f8fafc;
      --text-secondary: #a0aec0;
      --text-muted: #636e80;
      --accent-primary: #22c55e;
      --accent-primary-rgb: 34, 197, 94;
      --accent-secondary: #8b5cf6;
      --border-color: rgba(255, 255, 255, 0.08);
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-pill: 999px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
      --shadow-glow: 0 0 40px rgba(var(--accent-primary-rgb), 0.15);
      --display: 'Bricolage Grotesque', system-ui, sans-serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-container {
      width: 100%;
      max-width: 420px;
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .auth-header .logo {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-primary);
      text-shadow: 0 0 20px rgba(var(--accent-primary-rgb), 0.5);
      margin-bottom: 8px;
    }
    
    .auth-header h1 {
      margin: 0 0 8px;
      font-family: var(--display);
      font-size: 2rem;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .auth-header p {
      margin: 0;
      color: var(--text-secondary);
    }
    
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 32px;
      box-shadow: var(--shadow-glow);
    }
    
    .tab-switcher {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 4px;
      background: var(--bg-secondary);
      border-radius: var(--radius-pill);
      margin-bottom: 24px;
    }
    
    .tab-switcher button {
      padding: 12px;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s var(--ease);
    }
    
    .tab-switcher button.active {
      background: var(--accent-primary);
      color: var(--bg-primary);
      box-shadow: var(--shadow-glow);
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 1rem;
      transition: all 0.2s var(--ease);
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(var(--accent-primary-rgb), 0.2);
    }
    
    .form-group input::placeholder {
      color: var(--text-muted);
    }
    
    .btn {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-family: var(--mono);
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      margin-top: 8px;
    }
    
    .btn.primary {
      background: var(--accent-primary);
      color: var(--bg-primary);
      box-shadow: var(--shadow-glow);
    }
    
    .btn.primary:hover {
      background: #16a34a;
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(var(--accent-primary-rgb), 0.4);
    }
    
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.84rem;
    }
    
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    
    .social-login {
      display: grid;
      gap: 12px;
    }
    
    .social-btn {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .social-btn:hover {
      border-color: var(--accent-primary);
      background: var(--bg-card);
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.84rem;
    }
    
    .auth-footer a {
      color: var(--accent-primary);
      text-decoration: none;
    }
    
    .error-msg {
      display: none;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius);
      color: #ef4444;
      font-size: 0.84rem;
      margin-bottom: 16px;
    }
    
    .success-msg {
      display: none;
      padding: 12px 16px;
      background: rgba(var(--accent-primary-rgb), 0.1);
      border: 1px solid rgba(var(--accent-primary-rgb), 0.3);
      border-radius: var(--radius);
      color: var(--accent-primary);
      font-size: 0.84rem;
      margin-bottom: 16px;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 24px;
      font-family: var(--mono);
      font-size: 0.84rem;
      transition: color 0.2s;
    }
    
    .back-link:hover { color: var(--accent-primary); }
    
    .password-toggle {
      position: relative;
    }
    
    .password-toggle input {
      padding-right: 48px;
    }
    
    .password-toggle button {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
    }
    
    .password-toggle button:hover {
      color: var(--accent-primary);
    }
    
    .admin-badge {
      display: none;
      padding: 8px 12px;
      background: rgba(var(--accent-secondary), 0.1);
      border: 1px solid rgba(var(--accent-secondary), 0.3);
      border-radius: var(--radius);
      color: var(--accent-secondary);
      font-size: 0.78rem;
      text-align: center;
      margin-bottom: 16px;
    }
    
    @media (max-width: 480px) {
      body {
        padding: 16px;
        justify-content: flex-start;
        padding-top: 40px;
      }
      
      .auth-card {
        padding: 24px;
      }
      
      .auth-header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Home
    </a>
    
    <div class="auth-header">
      <div class="logo">AnimeForYou</div>
      <h1 id="formTitle">Welcome back</h1>
      <p id="formSubtitle">Sign in to continue watching</p>
    </div>
    
    <div class="auth-card">
      <div class="tab-switcher">
        <button id="loginTab" class="active" onclick="switchTab('login')">Login</button>
        <button id="signupTab" onclick="switchTab('signup')">Sign Up</button>
      </div>
      
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>
      <div class="admin-badge" id="adminBadge">Admin Account Detected</div>
      
      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-toggle">
            <input type="password" id="loginPassword" placeholder="Enter password" required />
            <button type="button" onclick="togglePassword('loginPassword', this)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn primary">Login</button>
        
        <div class="divider">or continue with</div>
        
        <div class="social-login">
          <button type="button" class="social-btn" onclick="socialLogin('google')">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </div>
      </form>
      
      <!-- Signup Form -->
      <form id="signupForm" style="display: none;" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signupName">Username</label>
          <input type="text" id="signupName" placeholder="Choose a username" required />
        </div>
        
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required />
        </div>
        
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="password-toggle">
            <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
            <button type="button" onclick="togglePassword('signupPassword', this)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <div class="password-toggle">
            <input type="password" id="signupConfirm" placeholder="Repeat password" required minlength="6" />
            <button type="button" onclick="togglePassword('signupConfirm', this)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn primary">Create Account</button>
        
        <div class="divider">or continue with</div>
        
        <div class="social-login">
          <button type="button" class="social-btn" onclick="socialLogin('google')">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </div>
      </form>
    </div>
    
    <div class="auth-footer">
      <p>Demo: admin@anime.com / admin123</p>
    </div>
  </div>

  <script>
    // Initialize users in localStorage
    function initUsers() {
      if (!localStorage.getItem('animeUsers')) {
        localStorage.setItem('animeUsers', JSON.stringify([
          {
            id: 1,
            name: 'Admin',
            email: 'admin@anime.com',
            password: 'admin123',
            role: 'admin',
            avatar: null,
            createdAt: new Date().toISOString()
          }
        ]));
      }
    }
    
    // Get users
    function getUsers() {
      return JSON.parse(localStorage.getItem('animeUsers') || '[]');
    }
    
    // Save users
    function saveUsers(users) {
      localStorage.setItem('animeUsers', JSON.stringify(users));
    }
    
    // Switch between login and signup
    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const loginTab = document.getElementById('loginTab');
      const signupTab = document.getElementById('signupTab');
      const title = document.getElementById('formTitle');
      const subtitle = document.getElementById('formSubtitle');
      
      hideMessages();
      
      if (tab === 'login') {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        title.textContent = 'Welcome back';
        subtitle.textContent = 'Sign in to continue watching';
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        loginTab.classList.remove('active');
        signupTab.classList.add('active');
        title.textContent = 'Create account';
        subtitle.textContent = 'Join AnimeForYou today';
      }
    }
    
    // Toggle password visibility
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      btn.innerHTML = isPassword 
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
    
    // Show error
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }
    
    // Show success
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }
    
    // Hide messages
    function hideMessages() {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'none';
      document.getElementById('adminBadge').style.display = 'none';
    }
    
    // Handle login
    function handleLogin(e) {
      e.preventDefault();
      hideMessages();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);
      
      if (user) {
        // Save current user session
        localStorage.setItem('animeCurrentUser', JSON.stringify(user));
        
        if (user.role === 'admin') {
          document.getElementById('adminBadge').style.display = 'block';
        }
        
        showSuccess('Login successful! Redirecting...');
        
        setTimeout(() => {
          if (user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'index.html';
          }
        }, 1000);
      } else {
        showError('Invalid email or password');
      }
    }
    
    // Handle signup
    function handleSignup(e) {
      e.preventDefault();
      hideMessages();
      
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      
      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }
      
      const users = getUsers();
      
      if (users.find(u => u.email === email)) {
        showError('Email already registered');
        return;
      }
      
      const newUser = {
        id: users.length + 1,
        name: name,
        email: email,
        password: password,
        role: 'user',
        avatar: null,
        createdAt: new Date().toISOString()
      };
      
      users.push(newUser);
      saveUsers(users);
      
      // Auto login
      localStorage.setItem('animeCurrentUser', JSON.stringify(newUser));
      
      showSuccess('Account created! Redirecting...');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }
    
    // Social login (demo)
    function socialLogin(provider) {
      const demoUser = {
        id: Date.now(),
        name: 'Google User',
        email: 'user@gmail.com',
        role: 'user',
        avatar: null,
        provider: provider,
        createdAt: new Date().toISOString()
      };
      
      localStorage.setItem('animeCurrentUser', JSON.stringify(demoUser));
      showSuccess('Logged in with ' + provider + '!');
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    }
    
    // Check if already logged in
    function checkAuth() {
      const user = JSON.parse(localStorage.getItem('animeCurrentUser'));
      if (user) {
        if (user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      }
    }
    
    // Initialize
    initUsers();
    checkAuth();
  </script>
</body>
</html>
